      <stop offset="0.55" stop-color="#ffead8" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ff441f" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="stage"><polygon points="112,0 1800,0 1800,1100 0,1100 0,210"/></clipPath>
    <clipPath id="filmA"><polygon points="0,48 478,0 535,420 48,472"/></clipPath>
    <clipPath id="filmB"><polygon points="56,0 620,48 560,470 0,420"/></clipPath>
    <clipPath id="filmC"><polygon points="0,0 486,0 546,360 42,414"/></clipPath>
