        <use href="#runner" x="130" y="178" width="128" height="205" opacity="0.94"/>
        <use href="#runner" x="286" y="146" width="132" height="212" transform="scale(-1 1) translate(-704 0)" opacity="0.98"/>
        <use href="#runner" x="440" y="210" width="96" height="154" opacity="0.82"/>
        <path d="M118 308 C232 276 362 264 552 226" stroke="url(#rim)" stroke-width="6" opacity="0.54"/>
      </g>
      <polygon points="56,0 620,48 560,470 0,420" fill="none" stroke="#ff4c22" stroke-width="4" opacity="0.94"/>
    </g>

    <g transform="translate(1260 604) rotate(-4)">
