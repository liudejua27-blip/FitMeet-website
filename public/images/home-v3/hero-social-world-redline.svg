        <use href="#runner" x="124" y="145" width="150" height="240"/>
        <use href="#runner" x="296" y="168" width="128" height="205" transform="scale(-1 1) translate(-720 0)" opacity="0.92"/>
        <path d="M86 392 C176 374 302 368 490 348" stroke="url(#rim)" stroke-width="7" opacity="0.68"/>
