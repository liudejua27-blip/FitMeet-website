      <stop offset="0.34" stop-color="#3a0503"/>
      <stop offset="0.68" stop-color="#f12d10"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="courtPhoto" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160403"/>
      <stop offset="0.48" stop-color="#b70e07"/>
      <stop offset="1" stop-color="#050202"/>
