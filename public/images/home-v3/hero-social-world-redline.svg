    </g>

    <path d="M-90 775 C290 690 620 650 942 618 C1262 586 1520 538 1910 414" fill="none" stroke="url(#streetLine)" stroke-width="16"/>
    <path d="M-110 910 C328 818 730 792 1115 784 C1410 778 1618 744 1905 658" fill="none" stroke="url(#streetLine)" stroke-width="8" opacity="0.78"/>
    <path d="M-70 1030 C360 954 785 920 1152 902 C1460 888 1640 842 1890 770" fill="none" stroke="#ff4a1d" stroke-width="4" opacity="0.7"/>

