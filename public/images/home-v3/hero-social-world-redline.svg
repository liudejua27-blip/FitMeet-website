<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" role="img" aria-label="Social World cinematic social film frame">
  <defs>
    <linearGradient id="worldBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020202"/>
      <stop offset="0.38" stop-color="#110302"/>
      <stop offset="0.7" stop-color="#8b0905"/>
      <stop offset="1" stop-color="#040101"/>
    </linearGradient>
    <radialGradient id="cityHeat" cx="75%" cy="44%" r="58%">
      <stop offset="0" stop-color="#ff3518" stop-opacity="0.95"/>
      <stop offset="0.34" stop-color="#c80a05" stop-opacity="0.58"/>
      <stop offset="0.78" stop-color="#160101" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000" stop-opacity="0.98"/>
      <stop offset="0.34" stop-color="#000" stop-opacity="0.72"/>
      <stop offset="0.56" stop-color="#000" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="streetLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2315" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#ff2e16" stop-opacity="0.94"/>
      <stop offset="0.68" stop-color="#ff8b20" stop-opacity="1"/>
      <stop offset="1" stop-color="#ff2315" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="runPhoto" x1="0" y1="0" x2="1" y2="1">
