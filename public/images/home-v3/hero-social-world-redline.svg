        <rect x="62" y="76" width="110" height="194" fill="#050505" opacity="0.84"/><rect x="208" y="34" width="156" height="260" fill="#070202" opacity="0.92"/><rect x="392" y="112" width="96" height="174" fill="#050505" opacity="0.82"/>
        <path d="M-10 302 C154 250 300 246 586 188" stroke="#ffefda" stroke-width="5" opacity="0.36"/>
