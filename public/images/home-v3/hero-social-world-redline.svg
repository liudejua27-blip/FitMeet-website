        <use href="#runner" x="276" y="190" width="88" height="142" transform="scale(-1 1) translate(-640 0)" opacity="0.88"/>
        <path d="M84 342 C190 320 306 316 480 286" stroke="url(#rim)" stroke-width="6" opacity="0.5"/>
