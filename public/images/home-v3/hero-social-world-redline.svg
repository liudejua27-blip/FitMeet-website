    <path d="M58 70 C74 63 90 64 101 74" stroke="#ffead8" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <path d="M82 44 C100 58 108 84 112 114" stroke="#ff3518" stroke-width="5" stroke-linecap="round" opacity="0.78"/>
  </symbol>

